name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and notes from CHANGELOG
        id: changelog
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 -oP '^##\s*\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          if [ -z "$VERSION" ]; then
            echo "::error::No version heading (## [x.y.z]) found in CHANGELOG.md"
            exit 1
          fi
          # Body of the first (latest) section, with the heading line dropped.
          awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md | tail -n +2 > release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.changelog.outputs.tag }}
        run: |
          set -euo pipefail
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file release_notes.md
          fi
